name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Клонируем репо если нет, иначе обновляем
            if [ -d /root/polybot ]; then
              cd /root/polybot
              git pull origin main
            else
              git clone https://github.com/KirilliX/polybot.git /root/polybot
              cd /root/polybot
            fi

            # Установка Node.js если нет
            if ! command -v node &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            # Установка serve если нет
            if ! command -v serve &>/dev/null; then
              npm install -g serve
            fi

            # Сборка UI
            cd /root/polybot/ui
            npm install --prefer-offline
            npm run build

            # Создаём systemd service (путь serve определяем динамически)
            SERVE_BIN=$(which serve)
            cat > /etc/systemd/system/polybot-ui.service << EOF
[Unit]
Description=Polymarket Bot UI
After=network.target

[Service]
Type=simple
WorkingDirectory=/root/polybot/ui
ExecStart=${SERVE_BIN} dist -p 3000 --no-clipboard
Restart=always
RestartSec=3

[Install]
WantedBy=multi-user.target
EOF

            systemctl daemon-reload
            systemctl enable polybot-ui
            systemctl restart polybot-ui

            echo "✅ UI deployed: http://${{ secrets.SERVER_HOST }}:3000"

            # ── Установка Docker если нет ──────────────────────────────────
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # ── Сборка и деплой бота (Docker) ─────────────────────────────
            cd /root/polybot
            docker build -t polybot:latest ./polymarket-arb-bot

            # Запускаем бот только если есть config.json с реальными ключами
            if [ -f /root/polybot-config/config.json ]; then
              docker compose up -d --force-recreate polybot
              echo "✅ Bot deployed and running"
            else
              echo "⚠️  Bot image built. Create /root/polybot-config/config.json to start the bot."
            fi
